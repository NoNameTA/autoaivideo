name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest, e2e gated off)
        run: pytest -q
      - name: Summary
        if: always()
        run: echo "Backend lint + pytest xong" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Build & Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build (vite)
        run: npm run build
      - name: Summary
        if: always()
        run: echo "Frontend lint + build xong" >> "$GITHUB_STEP_SUMMARY"

  agent:
    name: Build & Test Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest contract + fs + watcher)
        run: pytest -q
      - name: Summary
        if: always()
        run: echo "Agent lint + pytest xong" >> "$GITHUB_STEP_SUMMARY"
